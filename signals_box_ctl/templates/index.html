<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signals Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #ddd;
      margin: 0;
      padding: 0 0 40px;
    }
    .page-header {
      display: flex;
      align-items: flex-start;
      padding: 16px 4%;
      border-bottom: 1px solid #2e2e2e;
      margin-bottom: 8px;
    }
    .page-header h1 {
      flex: 1;
      text-align: center;
      margin: 0;
      font-size: 1.5em;
      color: #eee;
    }
    .card {
      background: #252525;
      border-radius: 6px;
      padding: 16px 20px;
      margin: 12px auto;
      width: 92%;
    }
    .card h3 {
      color: #888;
      margin: 0 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
      font-size: 0.75em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #1e1e1e;
      color: #777;
      text-align: left;
      padding: 10px 8px;
      font-size: 0.78em;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 2px solid #333;
    }
    td {
      padding: 10px 8px;
      border-bottom: 1px solid #2a2a2a;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #2b2b2b; }
    a { color: #7eb8f7; text-decoration: none; }
    a:hover { color: #aed4ff; text-decoration: underline; }
    a:visited { color: #9bafc7; }
    select, input[type=text] {
      background: #2a2a2a;
      color: #ddd;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 0.85em;
      font-family: inherit;
    }
    .btn {
      margin: 2px 3px;
      padding: 5px 10px;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-start { background: #1a4d2a; color: #5fdb7a; border-color: #2d7a42; }
    .btn-start:hover { background: #215c33; }
    .btn-stop { background: #4d1a1a; color: #db5f5f; border-color: #7a2d2d; }
    .btn-stop:hover { background: #5c2121; }
    .btn-neutral { background: #2a2a3e; color: #8888cc; border-color: #3a3a5e; }
    .btn-neutral:hover { background: #333347; }
    .cmd-output {
      font-family: "SFMono-Regular", Consolas, monospace;
      background: #1e1e1e;
      border-left: 3px solid #555;
      padding: 8px 14px;
      margin: 8px auto;
      width: 92%;
      border-radius: 0 4px 4px 0;
      font-size: 0.9em;
    }
    footer {
      text-align: center;
      padding: 16px;
      margin-top: 24px;
      border-top: 1px solid #2a2a2a;
      color: #444;
      font-size: 0.8em;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Signal Services Control Panel</h1>
    {{ gps_status | safe }}
  </div>

  {% if cmd_output %}
  <div class="cmd-output">{{ cmd_output }}</div>
  {% endif %}

  <div class="card">
    <h3>SDR List</h3>
    <table>
      {{ sdrlist | safe }}
    </table>
  </div>

  <form method="post" action="">
    <div class="card">
      <h3>Service List</h3>
      <table>
        {{ service_rows | safe }}
      </table>
    </div>

    <div class="card">
      <h3>Service Links</h3>
      {{ links_table | safe }}
    </div>

    <div style="margin:12px auto;width:92%;">
      {{ buttons | safe }}
    </div>
  </form>

  <footer>suidroot</footer>
</body>
</html>
