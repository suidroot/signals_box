<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signals Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- Apply saved theme before first paint to prevent flash -->
  <script>if(localStorage.getItem('signals-theme')==='light')document.body.classList.add('theme-light');</script>

  <div class="page-header">
    <h1>Signal Services Control Panel</h1>
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☀ Light</button>
    {{ gps_status | safe }}
  </div>

  {% if cmd_output %}
  <div class="cmd-output">{{ cmd_output }}</div>
  {% endif %}

  <div class="card">
    <h3>SDR List</h3>
    <table>
      {{ sdrlist | safe }}
    </table>
  </div>

  <form method="post" action="">
    <div class="card">
      <h3>Service List</h3>
      <table>
        {{ service_rows | safe }}
      </table>
    </div>

    <div class="card">
      <h3>Service Links</h3>
      {{ links_table | safe }}
    </div>

    <div style="margin:12px auto;width:92%;">
      {{ buttons | safe }}
    </div>
  </form>

  <footer>suidroot</footer>

  <script>
    const THEME_KEY = 'signals-theme';

    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('theme-light');
        document.getElementById('theme-btn').textContent = '🌙 Dark';
      } else {
        document.body.classList.remove('theme-light');
        document.getElementById('theme-btn').textContent = '☀ Light';
      }
    }

    function toggleTheme() {
      const next = (localStorage.getItem(THEME_KEY) || 'dark') === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    }

    // Sync button label with current theme on load
    applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
  </script>
</body>
</html>
